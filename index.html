<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <a class="logo" href="#">
    <img src="logo.png" alt="MathGamesRN logo" onerror="this.style.display='none'" />
    <span class="logo-text">MATH<span>GAMES</span>RN</span>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="https://mathgamesrn.github.io/old/">Old</a>
  </nav>
</header>

<section class="hero">
  <h1>Play. <em>Learn.</em> Level Up.</h1>
  <p>Free math games for every skill level. Fast, fun, and designed to keep your brain sharp.</p>
</section>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder="Search games…" autocomplete="off" />
  </div>
  <div class="filter-tags" id="filter-tags">
    <button class="tag-btn active" data-cat="all">All</button>
  </div>
  <select class="sort-select" id="sort-select">
    <option value="default">Sort: Default</option>
    <option value="name">Name A-Z</option>
    <option value="newest">Newest</option>
  </select>
</div>

<div class="stats-bar">
  Showing <span id="game-count">0</span> games
</div>

<div id="game-grid"></div>

<footer>
  © 2025 <span>MathGamesRN</span> · Built for learners everywhere
</footer>

<button id="scroll-top" title="Back to top">↑</button>

<!-- ══════════════════════════════════════════
     GAMES DATA  –  edit games.js to add games
════════════════════════════════════════════ -->
<script src="games.js"></script>

<script>
// ── RENDER ENGINE ──────────────────────────────────────────────
(function () {
  const grid      = document.getElementById('game-grid');
  const searchEl  = document.getElementById('search');
  const sortEl    = document.getElementById('sort-select');
  const countEl   = document.getElementById('game-count');
  const tagsWrap  = document.getElementById('filter-tags');
  const scrollBtn = document.getElementById('scroll-top');

  let activeCategory = 'all';
  let searchQuery    = '';
  let sortMode       = 'default';

  // Build category filter buttons from game data
  const categories = ['all', ...new Set(GAMES.map(g => g.category))].filter(Boolean);
  tagsWrap.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (cat === 'all' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat === 'all' ? 'All' : cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    tagsWrap.appendChild(btn);
  });

  function matchesSearch(game) {
    const q = searchQuery.toLowerCase();
    return !q ||
      game.title.toLowerCase().includes(q) ||
      (game.description || '').toLowerCase().includes(q) ||
      (game.category || '').toLowerCase().includes(q);
  }

  function getFiltered() {
    let list = GAMES.filter(g =>
      (activeCategory === 'all' || g.category === activeCategory) &&
      matchesSearch(g)
    );
    if (sortMode === 'name')   list = [...list].sort((a,b) => a.title.localeCompare(b.title));
    if (sortMode === 'rating') list = [...list].sort((a,b) => (b.rating||0) - (a.rating||0));
    if (sortMode === 'newest') list = [...list].sort((a,b) => (b.id||0) - (a.id||0));
    return list;
  }

  function starString(rating) {
    if (!rating) return '';
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function renderCard(game) {
    const card = document.createElement('a');
    card.className = 'game-card';
    card.href = game.url || '#';
    card.target = '_self';

    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';

    if (game.thumbnail) {
      const img = document.createElement('img');
      img.src = game.thumbnail;
      img.alt = game.title;
      img.loading = 'lazy';
      img.onerror = () => { thumb.innerHTML = game.icon || '🎮'; };
      thumb.appendChild(img);
    } else {
      thumb.textContent = game.icon || '🎮';
    }

    card.innerHTML += `
      <div class="card-body">
        <div class="card-title">${game.title}</div>
        ${game.description ? `<div class="card-desc">${game.description}</div>` : ''}
        <div class="card-meta">
          <span class="card-cat">${game.category || 'Game'}</span>
          ${game.rating ? `<span class="card-rating">${starString(game.rating)}</span>` : ''}
        </div>
      </div>`;

    card.prepend(thumb);
    return card;
  }

  // Virtualized / lazy render for performance with 100+ games
  let renderTimeout;
  function render() {
    clearTimeout(renderTimeout);
    renderTimeout = setTimeout(() => {
      const filtered = getFiltered();
      countEl.textContent = filtered.length;

      // Use DocumentFragment for one DOM write
      const frag = document.createDocumentFragment();
      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="icon">🔍</div><h3>No games found</h3><p>Try a different search or category.</p>';
        frag.appendChild(empty);
      } else {
        filtered.forEach(g => frag.appendChild(renderCard(g)));
      }

      grid.innerHTML = '';
      grid.appendChild(frag);
    }, 80);
  }

  searchEl.addEventListener('input', (e) => { searchQuery = e.target.value; render(); });
  sortEl.addEventListener('change', (e) => { sortMode = e.target.value; render(); });

  // Scroll-to-top button
  window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  render();
})();
</script>
</body>
</html>
