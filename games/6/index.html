<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Apotheon - WebAssembly Port</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
		body {
			background: url('Apotheon bg') center/cover no-repeat;
			color: #fff;
			font-family: 'Georgia', serif;
		}
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.35);
			pointer-events: none;
			z-index: 0;
		}
		body.game-active { background: #000; }
		body.game-active::before { display: none; }

		#loading {
			position: fixed; inset: 0;
			display: flex; align-items: center; justify-content: center;
			flex-direction: column;
			z-index: 100;
			transition: opacity 0.8s;
		}
		#loading.hidden { opacity: 0; pointer-events: none; }

		.content-wrapper {
			position: relative;
			z-index: 10;
			text-align: center;
			background: rgba(20, 15, 10, 0.7);
			padding: 40px 60px;
			border-radius: 4px;
			backdrop-filter: blur(2px);
		}
		.content-wrapper h1 {
			font-size: 4rem;
			margin-bottom: 0.5rem;
			color: #d4a574;
			text-transform: uppercase;
			letter-spacing: 0.2em;
			font-weight: bold;
			text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
		}
		.content-wrapper .subtitle {
			font-size: 1.1rem;
			color: #b8956a;
			margin-bottom: 2.5rem;
			font-style: italic;
			letter-spacing: 0.05em;
			text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
		}
		#status {
			font-size: 0.95rem;
			color: #b8956a;
			margin-top: 1.5rem;
			font-weight: 500;
			text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
		}
		#progress-bar {
			width: 450px;
			height: 8px;
			background: rgba(0, 0, 0, 0.4);
			border-radius: 2px;
			overflow: hidden;
			margin: 1.5rem 0;
			box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
		}
		#progress-fill {
			height: 100%;
			background: linear-gradient(90deg, #a67c52, #c9864f, #a67c52);
			width: 0%;
			transition: width 0.3s ease;
			box-shadow: 0 0 6px rgba(169, 124, 82, 0.5);
		}
		#game-console {
			position: relative;
			width: 450px;
			max-height: 120px;
			margin-top: 12px;
			background: rgba(0, 0, 0, 0.65);
			color: #c8b896;
			font-family: 'Consolas', 'Courier New', monospace;
			font-size: 0.72rem;
			line-height: 1.35;
			overflow: hidden;
			padding: 6px 10px;
			border: 1px solid #4a3a28;
			border-radius: 3px;
			z-index: 10;
			pointer-events: none;
			transition: opacity 0.6s;
			-ms-overflow-style: none;
			scrollbar-width: none;
		}
		#game-console::-webkit-scrollbar { display: none; }
		#game-console.hidden { opacity: 0; }
		#game-console .log-line { white-space: pre-wrap; word-break: break-all; }
		#game-console .log-warn { color: #d4a030; }
		#game-console .log-error { color: #c85050; }
		#game-console .log-info { color: #7a9ab8; }

		canvas {
			display: none;
			position: fixed;
			top: 50%; left: 50%;
			transform: translate(-50%, -50%);
			max-width: 100vw; max-height: 100vh;
			width: auto; height: auto;
			object-fit: contain;
			background: #000;
		}
		canvas.visible { display: block; }




		@media (max-width: 768px) {
			.content-wrapper h1 { font-size: 2.5rem; }
			#progress-bar, #game-console { width: 90vw; max-width: 400px; }
		}
	</style>
</head>
<body>
	<div id="loading">
	<div class="content-wrapper">
	<h1>APOTHEON</h1>
	<div class="subtitle">WebAssembly Port</div>
	<div id="progress-bar"><div id="progress-fill"></div></div>
	<div id="status">Initializing...</div>
	<div id="game-console"></div>
	</div>
	</div>
	<canvas id="canvas" width="1920" height="1080" oncontextmenu="event.preventDefault()"></canvas>



	<script>
	(function() {
		const con = document.getElementById('game-console');
		const maxLines = 200;
		let lineCount = 0;
		function addLine(text, cls) {
			if (typeof text === 'string') {
				if (text.includes('INVALID_ENUM') ||
					text.includes('Deprecation') ||
					text.includes('Violation') ||
					text.includes('workload')) return;
			}
			const div = document.createElement('div');
			div.className = 'log-line' + (cls ? ' ' + cls : '');
			div.textContent = typeof text === 'string' ? text : String(text);
			con.appendChild(div);
			lineCount++;
			if (lineCount > maxLines) {
				con.removeChild(con.firstChild);
				lineCount--;
			}
			con.scrollTop = con.scrollHeight;
		}

		const origLog = console.log.bind(console);
		const origWarn = console.warn.bind(console);
		const origError = console.error.bind(console);
		const origDebug = console.debug.bind(console);

		console.log = function(...args) {
			origLog(...args);
			addLine(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
		};
		console.debug = function(...args) {
			origDebug(...args);
			addLine(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)), 'log-info');
		};
		console.warn = function(...args) {
			origWarn(...args);
			addLine(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)), 'log-warn');
		};
		console.error = function(...args) {
			origError(...args);
			addLine(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)), 'log-error');
		};
		window.hideGameConsole = function() { con.classList.add('hidden'); };
		window.showGameConsole = function() { con.classList.remove('hidden'); };
	})();
</script>
<script src="coi-serviceworker.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module" src="game.js?v=20260408-runtimepathfix1"></script>

</body>
</html>
